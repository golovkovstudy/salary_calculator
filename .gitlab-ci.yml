pages:
  stage: deploy
  image: af.tel.yadro.com/telecom/bun-1.3.3-alpine:1
  tags: [static-k8s]
  before_script:
    - wget http://nginx.tel.yadro.com/ca/root.tel.yadro.com.crt -O /usr/local/share/ca-certificates/root.tel.yadro.com.crt; update-ca-certificates --fresh
    - printf "https://af.tel.yadro.com:443/artifactory/telecom-alpine-remote/v3.2/main\nhttps://af.tel.yadro.com:443/artifactory/telecom-alpine-remote/v3.22/community" > /etc/apk/repositories
    - apk update && apk add git
  script:
    - bun install --frozen-lockfile --verbose
    - bun run build
    - cp -r dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: https://$CI_PROJECT_NAMESPACE.gitlab.io/$CI_PROJECT_NAME/